<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunder Shooter - 雷电射击游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a12;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }

        #gameCanvas {
            display: block;
            background: #0a0a12;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .ui-text {
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            letter-spacing: 2px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 18, 0.9);
            z-index: 20;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay h1 {
            font-size: 48px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            margin-bottom: 20px;
            letter-spacing: 8px;
        }

        #overlay p {
            color: #fff;
            font-size: 20px;
            margin: 10px 0;
            text-shadow: 0 0 5px #fff;
        }

        #overlay .subtitle {
            color: #ff4444;
            font-size: 16px;
            margin-top: 30px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        .controls {
            margin-top: 40px;
            color: #888;
            font-size: 14px;
            text-align: center;
            line-height: 2;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <span id="scoreDisplay" class="ui-text">SCORE: 0</span>
        <span id="livesDisplay" class="ui-text">LIVES: 3</span>
    </div>

    <div id="overlay">
        <h1>THUNDER SHOOTER</h1>
        <p>经典雷电风格射击游戏</p>
        <p class="subtitle">按 SPACE 开始游戏</p>
        <div class="controls">
            方向键 / WASD - 移动<br>
            空格 - 发射子弹<br>
            Enter - 重新开始
        </div>
    </div>

    <script>
    /**
     * ========================================
     * Thunder Shooter - 雷电风格飞行射击游戏
     * ========================================
     * 单文件 HTML5 Canvas 游戏
     * 使用 requestAnimationFrame 实现 60 FPS
     */

    // ==================== 常量配置 ====================
    const CONFIG = {
        // 画布设置
        CANVAS_WIDTH: 480,
        CANVAS_HEIGHT: 720,
        
        // 玩家设置
        PLAYER_SPEED: 5,
        PLAYER_WIDTH: 40,
        PLAYER_HEIGHT: 50,
        PLAYER_FIRE_RATE: 10,      // 发射间隔（帧数）
        PLAYER_START_LIVES: 3,
        PLAYER_INVINCIBLE_TIME: 90, // 无敌时间（帧数）
        
        // 子弹设置
        BULLET_SPEED: 8,
        BULLET_WIDTH: 4,
        BULLET_HEIGHT: 12,
        
        // 敌机设置
        ENEMY_SPAWN_INITIAL: 60,    // 初始生成间隔
        ENEMY_SPAWN_MIN: 20,        // 最小生成间隔
        ENEMY_SPEED_BASE: 2,
        
        // 颜色
        COLORS: {
            PLAYER: '#00ffff',
            PLAYER_CORE: '#ffffff',
            ENEMY_A: '#ff4444',
            ENEMY_B: '#ff8800',
            ENEMY_C: '#ff2222',
            BULLET: '#ffff00',
            EXPLOSION: ['#ffff00', '#ff8800', '#ff4400', '#ff0000']
        }
    };

    // ==================== 游戏状态 ====================
    const gameState = {
        running: false,
        score: 0,
        lives: CONFIG.PLAYER_START_LIVES,
        frameCount: 0,
        difficulty: 1,
        lastSpawn: 0,
        spawnInterval: CONFIG.ENEMY_SPAWN_INITIAL
    };

    // ==================== 输入状态 ====================
    const keys = {
        up: false,
        down: false,
        left: false,
        right: false,
        space: false,
        enter: false
    };

    // ==================== 游戏对象数组 ====================
    let player = null;
    let bullets = [];
    let enemies = [];
    let particles = [];
    let stars = [];

    // ==================== Canvas 设置 ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');

    // 响应式画布大小
    function resizeCanvas() {
        const maxWidth = window.innerWidth;
        const maxHeight = window.innerHeight;
        const ratio = CONFIG.CANVAS_WIDTH / CONFIG.CANVAS_HEIGHT;
        
        let width = maxWidth;
        let height = maxWidth / ratio;
        
        if (height > maxHeight) {
            height = maxHeight;
            width = maxHeight * ratio;
        }
        
        canvas.width = CONFIG.CANVAS_WIDTH;
        canvas.height = CONFIG.CANVAS_HEIGHT;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
    }

    // ==================== 星星背景类 ====================
    class Star {
        constructor(layer) {
            this.layer = layer;
            this.reset(true);
        }

        reset(initial = false) {
            this.x = Math.random() * CONFIG.CANVAS_WIDTH;
            this.y = initial ? Math.random() * CONFIG.CANVAS_HEIGHT : -5;
            this.size = (3 - this.layer) * 0.8 + Math.random() * 0.5;
            this.speed = (3 - this.layer) * 0.5 + 0.5;
            this.alpha = (3 - this.layer) * 0.3 + 0.2;
        }

        update() {
            this.y += this.speed;
            if (this.y > CONFIG.CANVAS_HEIGHT + 5) {
                this.reset();
            }
        }

        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // ==================== 玩家类 ====================
    class Player {
        constructor() {
            this.width = CONFIG.PLAYER_WIDTH;
            this.height = CONFIG.PLAYER_HEIGHT;
            this.x = CONFIG.CANVAS_WIDTH / 2 - this.width / 2;
            this.y = CONFIG.CANVAS_HEIGHT - this.height - 50;
            this.fireCounter = 0;
            this.invincible = 0;
            this.engineFlicker = 0;
        }

        update() {
            // 移动控制
            if (keys.up && this.y > 0) this.y -= CONFIG.PLAYER_SPEED;
            if (keys.down && this.y < CONFIG.CANVAS_HEIGHT - this.height) this.y += CONFIG.PLAYER_SPEED;
            if (keys.left && this.x > 0) this.x -= CONFIG.PLAYER_SPEED;
            if (keys.right && this.x < CONFIG.CANVAS_WIDTH - this.width) this.x += CONFIG.PLAYER_SPEED;

            // 射击冷却
            if (this.fireCounter > 0) this.fireCounter--;
            
            // 发射子弹
            if (keys.space && this.fireCounter === 0) {
                this.fire();
                this.fireCounter = CONFIG.PLAYER_FIRE_RATE;
            }

            // 无敌时间递减
            if (this.invincible > 0) this.invincible--;

            // 引擎闪烁
            this.engineFlicker = Math.sin(gameState.frameCount * 0.3) * 0.3 + 0.7;
        }

        fire() {
            bullets.push(new Bullet(
                this.x + this.width / 2 - CONFIG.BULLET_WIDTH / 2,
                this.y - CONFIG.BULLET_HEIGHT
            ));
        }

        draw() {
            // 无敌闪烁效果
            if (this.invincible > 0 && Math.floor(this.invincible / 5) % 2 === 0) {
                return;
            }

            const cx = this.x + this.width / 2;
            const cy = this.y + this.height / 2;

            // 引擎火焰
            ctx.save();
            const flameHeight = 15 * this.engineFlicker;
            const gradient = ctx.createLinearGradient(cx, this.y + this.height, cx, this.y + this.height + flameHeight);
            gradient.addColorStop(0, '#00ffff');
            gradient.addColorStop(0.5, '#0088ff');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(cx - 8, this.y + this.height);
            ctx.lineTo(cx, this.y + this.height + flameHeight);
            ctx.lineTo(cx + 8, this.y + this.height);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // 飞船主体 - 发光效果
            ctx.save();
            ctx.shadowColor = CONFIG.COLORS.PLAYER;
            ctx.shadowBlur = 15;

            // 飞船形状
            ctx.fillStyle = CONFIG.COLORS.PLAYER;
            ctx.beginPath();
            ctx.moveTo(cx, this.y);                           // 机头
            ctx.lineTo(this.x + this.width, this.y + this.height * 0.7);  // 右翼
            ctx.lineTo(this.x + this.width - 8, this.y + this.height);    // 右尾
            ctx.lineTo(cx, this.y + this.height - 15);                       // 底部中点
            ctx.lineTo(this.x + 8, this.y + this.height);                    // 左尾
            ctx.lineTo(this.x, this.y + this.height * 0.7);                 // 左翼
            ctx.closePath();
            ctx.fill();

            // 驾驶舱核心
            ctx.fillStyle = CONFIG.COLORS.PLAYER_CORE;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(cx, this.y + 20, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        hit() {
            if (this.invincible > 0) return false;
            
            gameState.lives--;
            this.invincible = CONFIG.PLAYER_INVINCIBLE_TIME;
            
            // 创建爆炸效果
            createExplosion(this.x + this.width / 2, this.y + this.height / 2, 10);
            
            updateUI();
            
            if (gameState.lives <= 0) {
                gameOver();
                return true;
            }
            return false;
        }

        getBounds() {
            return {
                x: this.x + 5,
                y: this.y + 5,
                width: this.width - 10,
                height: this.height - 10
            };
        }
    }

    // ==================== 子弹类 ====================
    class Bullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = CONFIG.BULLET_WIDTH;
            this.height = CONFIG.BULLET_HEIGHT;
            this.speed = CONFIG.BULLET_SPEED;
            this.active = true;
        }

        update() {
            this.y -= this.speed;
            if (this.y + this.height < 0) {
                this.active = false;
            }
        }

        draw() {
            ctx.save();
            ctx.shadowColor = CONFIG.COLORS.BULLET;
            ctx.shadowBlur = 10;
            
            // 子弹主体
            ctx.fillStyle = CONFIG.COLORS.BULLET;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            // 子弹尾迹
            const gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height * 2);
            gradient.addColorStop(0, 'rgba(255, 255, 0, 0.5)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(this.x, this.y + this.height, this.width, this.height);
            
            ctx.restore();
        }

        getBounds() {
            return {
                x: this.x,
                y: this.y,
                width: this.width,
                height: this.height
            };
        }
    }

    // ==================== 敌机类 ====================
    class Enemy {
        constructor(type) {
            this.type = type;
            this.setProperties();
            this.x = Math.random() * (CONFIG.CANVAS_WIDTH - this.width);
            this.y = -this.height;
            this.active = true;
            this.startX = this.x;
            this.phase = Math.random() * Math.PI * 2;
        }

        setProperties() {
            switch (this.type) {
                case 'A': // 基础型
                    this.width = 30;
                    this.height = 30;
                    this.speed = CONFIG.ENEMY_SPEED_BASE * (0.8 + gameState.difficulty * 0.1);
                    this.hp = 1;
                    this.points = 100;
                    this.color = CONFIG.COLORS.ENEMY_A;
                    break;
                case 'B': // 蛇形
                    this.width = 35;
                    this.height = 35;
                    this.speed = CONFIG.ENEMY_SPEED_BASE * (0.6 + gameState.difficulty * 0.1);
                    this.hp = 2;
                    this.points = 200;
                    this.color = CONFIG.COLORS.ENEMY_B;
                    this.amplitude = 50;
                    this.frequency = 0.03;
                    break;
                case 'C': // 重型
                    this.width = 50;
                    this.height = 50;
                    this.speed = CONFIG.ENEMY_SPEED_BASE * (0.5 + gameState.difficulty * 0.1);
                    this.hp = 3;
                    this.points = 500;
                    this.color = CONFIG.COLORS.ENEMY_C;
                    break;
            }
        }

        update() {
            this.y += this.speed;
            
            // 蛇形移动
            if (this.type === 'B') {
                this.x = this.startX + Math.sin(this.y * this.frequency + this.phase) * this.amplitude;
                // 边界约束
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > CONFIG.CANVAS_WIDTH) this.x = CONFIG.CANVAS_WIDTH - this.width;
            }

            // 移出屏幕
            if (this.y > CONFIG.CANVAS_HEIGHT + this.height) {
                this.active = false;
            }
        }

        draw() {
            const cx = this.x + this.width / 2;
            const cy = this.y + this.height / 2;

            ctx.save();
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 10;
            ctx.fillStyle = this.color;

            // 根据类型绘制不同形状
            ctx.beginPath();
            if (this.type === 'A') {
                // 三角形（朝下）
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width, this.y);
                ctx.lineTo(cx, this.y + this.height);
            } else if (this.type === 'B') {
                // 六边形
                const r = this.width / 2;
                for (let i = 0; i < 6; i++) {
                    const angle = (i * Math.PI / 3) + Math.PI / 6;
                    const px = cx + r * Math.cos(angle);
                    const py = cy + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
            } else {
                // 重型 - 菱形
                ctx.moveTo(cx, this.y);
                ctx.lineTo(this.x + this.width, cy);
                ctx.lineTo(cx, this.y + this.height);
                ctx.lineTo(this.x, cy);
            }
            ctx.closePath();
            ctx.fill();

            // 核心发光
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        hit() {
            this.hp--;
            if (this.hp <= 0) {
                this.active = false;
                gameState.score += this.points;
                createExplosion(this.x + this.width / 2, this.y + this.height / 2, 20);
                updateUI();
                return true;
            }
            // 受伤闪烁
            createExplosion(this.x + this.width / 2, this.y + this.height / 2, 5);
            return false;
        }

        getBounds() {
            return {
                x: this.x + 3,
                y: this.y + 3,
                width: this.width - 6,
                height: this.height - 6
            };
        }
    }

    // ==================== 粒子类 ====================
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.size = Math.random() * 4 + 2;
            this.speedX = (Math.random() - 0.5) * 6;
            this.speedY = (Math.random() - 0.5) * 6;
            this.life = Math.random() * 20 + 30;
            this.maxLife = this.life;
            this.active = true;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.speedX *= 0.98;
            this.speedY *= 0.98;
            this.life--;
            if (this.life <= 0) {
                this.active = false;
            }
        }

        draw() {
            const alpha = this.life / this.maxLife;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = this.color;
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // ==================== 爆炸效果创建 ====================
    function createExplosion(x, y, count) {
        for (let i = 0; i < count; i++) {
            const color = CONFIG.COLORS.EXPLOSION[Math.floor(Math.random() * CONFIG.COLORS.EXPLOSION.length)];
            particles.push(new Particle(x, y, color));
        }
    }

    // ==================== 碰撞检测 (AABB) ====================
    function checkCollision(a, b) {
        return a.x < b.x + b.width &&
               a.x + a.width > b.x &&
               a.y < b.y + b.height &&
               a.y + a.height > b.y;
    }

    // ==================== 敌机生成 ====================
    function spawnEnemy() {
        const rand = Math.random();
        let type;
        
        if (rand < 0.6) type = 'A';
        else if (rand < 0.9) type = 'B';
        else type = 'C';
        
        enemies.push(new Enemy(type));
    }

    // ==================== 更新 UI ====================
    function updateUI() {
        scoreDisplay.textContent = `SCORE: ${gameState.score}`;
        livesDisplay.textContent = `LIVES: ${gameState.lives}`;
    }

    // ==================== 游戏结束 ====================
    function gameOver() {
        gameState.running = false;
        overlay.classList.remove('hidden');
        overlay.innerHTML = `
            <h1>GAME OVER</h1>
            <p>最终得分: ${gameState.score}</p>
            <p class="subtitle">按 ENTER 重新开始</p>
        `;
    }

    // ==================== 游戏重置 ====================
    function resetGame() {
        gameState.score = 0;
        gameState.lives = CONFIG.PLAYER_START_LIVES;
        gameState.frameCount = 0;
        gameState.difficulty = 1;
        gameState.spawnInterval = CONFIG.ENEMY_SPAWN_INITIAL;
        
        player = new Player();
        bullets = [];
        enemies = [];
        particles = [];
        
        updateUI();
    }

    // ==================== 游戏主循环 ====================
    function gameLoop() {
        if (!gameState.running) return;

        gameState.frameCount++;

        // 难度递增（每30秒增加一次难度）
        if (gameState.frameCount % 1800 === 0 && gameState.difficulty < 5) {
            gameState.difficulty++;
            gameState.spawnInterval = Math.max(
                CONFIG.ENEMY_SPAWN_MIN,
                CONFIG.ENEMY_SPAWN_INITIAL - (gameState.difficulty - 1) * 10
            );
        }

        // 生成敌机
        if (gameState.frameCount - gameState.lastSpawn >= gameState.spawnInterval) {
            spawnEnemy();
            gameState.lastSpawn = gameState.frameCount;
        }

        // 更新星星背景
        stars.forEach(star => star.update());

        // 更新玩家
        player.update();

        // 更新子弹
        bullets.forEach(bullet => bullet.update());
        bullets = bullets.filter(b => b.active);

        // 更新敌机
        enemies.forEach(enemy => enemy.update());
        enemies = enemies.filter(e => e.active);

        // 更新粒子
        particles.forEach(particle => particle.update());
        particles = particles.filter(p => p.active);

        // 碰撞检测
        // 子弹 vs 敌机
        bullets.forEach(bullet => {
            enemies.forEach(enemy => {
                if (bullet.active && enemy.active && checkCollision(bullet.getBounds(), enemy.getBounds())) {
                    bullet.active = false;
                    enemy.hit();
                }
            });
        });

        // 敌机 vs 玩家
        enemies.forEach(enemy => {
            if (enemy.active && checkCollision(enemy.getBounds(), player.getBounds())) {
                enemy.active = false;
                createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, 15);
                player.hit();
            }
        });

        // 渲染
        render();

        requestAnimationFrame(gameLoop);
    }

    // ==================== 渲染 ====================
    function render() {
        // 清空画布
        ctx.fillStyle = '#0a0a12';
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        // 绘制星星背景
        stars.forEach(star => star.draw());

        // 绘制粒子
        particles.forEach(particle => particle.draw());

        // 绘制子弹
        bullets.forEach(bullet => bullet.draw());

        // 绘制敌机
        enemies.forEach(enemy => enemy.draw());

        // 绘制玩家
        if (player) player.draw();
    }

    // ==================== 初始化星星背景 ====================
    function initStars() {
        stars = [];
        for (let layer = 0; layer < 3; layer++) {
            for (let i = 0; i < 30; i++) {
                stars.push(new Star(layer));
            }
        }
    }

    // ==================== 输入处理 ====================
    function handleKeyDown(e) {
        switch (e.code) {
            case 'ArrowUp':
            case 'KeyW':
                keys.up = true;
                e.preventDefault();
                break;
            case 'ArrowDown':
            case 'KeyS':
                keys.down = true;
                e.preventDefault();
                break;
            case 'ArrowLeft':
            case 'KeyA':
                keys.left = true;
                e.preventDefault();
                break;
            case 'ArrowRight':
            case 'KeyD':
                keys.right = true;
                e.preventDefault();
                break;
            case 'Space':
                keys.space = true;
                e.preventDefault();
                if (!gameState.running && overlay.querySelector('.subtitle').textContent.includes('SPACE')) {
                    startGame();
                }
                break;
            case 'Enter':
                keys.enter = true;
                if (!gameState.running) {
                    startGame();
                }
                break;
        }
    }

    function handleKeyUp(e) {
        switch (e.code) {
            case 'ArrowUp':
            case 'KeyW':
                keys.up = false;
                break;
            case 'ArrowDown':
            case 'KeyS':
                keys.down = false;
                break;
            case 'ArrowLeft':
            case 'KeyA':
                keys.left = false;
                break;
            case 'ArrowRight':
            case 'KeyD':
                keys.right = false;
                break;
            case 'Space':
                keys.space = false;
                break;
            case 'Enter':
                keys.enter = false;
                break;
        }
    }

    // ==================== 开始游戏 ====================
    function startGame() {
        overlay.classList.add('hidden');
        resetGame();
        gameState.running = true;
        gameState.lastSpawn = gameState.frameCount;
        gameLoop();
    }

    // ==================== 主初始化 ====================
    function init() {
        resizeCanvas();
        initStars();
        
        // 监听事件
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);

        // 初始渲染背景
        stars.forEach(star => star.draw());
    }

    // 启动游戏
    init();
    </script>
</body>
</html>
